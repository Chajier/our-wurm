<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wurm Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
      background: black;
    }

    /* Search UI */
    #searchBox {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      color: white;
    }

    #searchResults {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 5px;
    }

    .resultItem {
      cursor: pointer;
      padding: 3px;
    }

    .resultItem:hover {
      background: rgba(255,255,255,0.2);
    }

    /* Label above marker */
    .label {
      color: white;
      font-size: 10px;
      text-align: center;
      text-shadow: 0 0 3px black;
    }

    /* Pulse animation */
    .pulse {
      animation: pulseAnim 1s infinite;
    }

    @keyframes pulseAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.6); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Search marker..." />
  <button onclick="searchMarker()">Find</button>
  <div id="searchResults"></div>
</div>

<script>
/* =========================
   FIREBASE SETUP
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyAMpkD6c0HeJdxp6BVdQGm4P6o6V9ERSJ4",
  authDomain: "our-wurm.firebaseapp.com",
  databaseURL: "https://our-wurm-default-rtdb.firebaseio.com",
  projectId: "our-wurm",
  storageBucket: "our-wurm.firebasestorage.app",
  messagingSenderId: "900514136114",
  appId: "1:900514136114:web:3142efd7e24909a043bc2b"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* =========================
   MAP SETUP
========================= */
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2
});

const bounds = [[0,0],[4096,4096]];
const image = L.imageOverlay('Cadence-terrain-20260224.png', bounds).addTo(map);
map.fitBounds(bounds);

/* =========================
   MARKER STORAGE
========================= */
let markers = {};

/* =========================
   CREATE MARKER ICON
========================= */
function createIcon(color, pulse=false) {
  return L.divIcon({
    className: '',
    html: `<div class="${pulse ? 'pulse' : ''}" style="
      width:12px;
      height:12px;
      background:${color};
      border-radius:50%;
      border:2px solid black;
    "></div>`
  });
}

/* =========================
   ADD MARKER TO MAP
========================= */
function addMarker(data, key) {
  if (markers[key]) return;

  const marker = L.marker([data.lat, data.lng], {
    icon: createIcon(data.color || 'yellow')
  }).addTo(map);

  const label = L.marker([data.lat, data.lng], {
    icon: L.divIcon({
      className: 'label',
      html: data.name,
      iconSize: [100,20],
      iconAnchor: [50,25]
    })
  }).addTo(map);

  marker.bindPopup(`
    <b>${data.name}</b><br>
    (${Math.round(data.lat)}, ${Math.round(data.lng)})<br><br>

    Name:<br>
    <input id="name-${key}" value="${data.name}"><br>

    Color:<br>
    <select id="color-${key}">
      <option value="yellow">Yellow</option>
      <option value="red">Red</option>
      <option value="blue">Blue</option>
      <option value="green">Green</option>
    </select><br><br>

    <button onclick="saveEdit('${key}')">Save</button>
    <button onclick="deleteMarker('${key}')">Delete</button>
  `);

  markers[key] = { marker, label, data };
}

/* =========================
   REMOVE MARKER
========================= */
function removeMarker(key) {
  if (!markers[key]) return;

  map.removeLayer(markers[key].marker);
  map.removeLayer(markers[key].label);
  delete markers[key];
}

/* =========================
   CLICK TO CREATE MARKER
========================= */
map.on('click', function(e) {
  const name = prompt("Enter deed name:");
  if (!name) return;

  const newRef = db.ref("markers").push();
  newRef.set({
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    name: name,
    color: "yellow"
  });
});

/* =========================
   SAVE EDIT
========================= */
window.saveEdit = function(key) {
  const name = document.getElementById(`name-${key}`).value;
  const color = document.getElementById(`color-${key}`).value;

  db.ref("markers/" + key).set({
    ...markers[key].data,
    name,
    color
  });
};

/* =========================
   DELETE MARKER
========================= */
window.deleteMarker = function(key) {
  db.ref("markers/" + key).remove();
};

/* =========================
   REALTIME SYNC
========================= */
db.ref("markers").on("value", snapshot => {
  const data = snapshot.val() || {};

  // Remove old
  for (let key in markers) {
    if (!data[key]) removeMarker(key);
  }

  // Add/update
  for (let key in data) {
    if (!markers[key]) {
      addMarker(data[key], key);
    } else {
      // update existing
      markers[key].data = data[key];
      markers[key].marker.setIcon(createIcon(data[key].color));
      markers[key].label.setIcon(L.divIcon({
        className: 'label',
        html: data[key].name
      }));
    }
  }

  updateSearchList();
});

/* =========================
   SEARCH SYSTEM
========================= */
function searchMarker() {
  const input = document.getElementById("searchInput").value.toLowerCase();

  for (let key in markers) {
    if (markers[key].data.name.toLowerCase() === input) {
      jumpToMarker(key);
      return;
    }
  }

  alert("Not found");
}

function jumpToMarker(key) {
  const m = markers[key];

  map.setView(m.marker.getLatLng(), 2);

  m.marker.setIcon(createIcon(m.data.color, true));

  setTimeout(() => {
    m.marker.setIcon(createIcon(m.data.color));
  }, 2000);
}

/* =========================
   SEARCH LIST UI
========================= */
function updateSearchList() {
  const container = document.getElementById("searchResults");
  container.innerHTML = "";

  for (let key in markers) {
    const div = document.createElement("div");
    div.className = "resultItem";
    div.innerText = markers[key].data.name;

    div.onclick = () => jumpToMarker(key);

    container.appendChild(div);
  }
}

/* =========================
   FIREBASE TEST
========================= */
(function testConnection() {
  const testRef = db.ref("markers").push();

  testRef.set({
    lat: 0,
    lng: 0,
    name: "test",
    color: "yellow"
  }).then(() => {
    console.log("Firebase connected!");
    testRef.remove();
  }).catch(() => {
    alert("Firebase FAILED");
  });
})();
</script>

</body>
</html>
