<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wurm Map Pro</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; width: 100%; }

    .marker-label {
      font-size: 10px;
      font-weight: bold;
      background: rgba(255,255,255,0.7);
      padding: 1px 3px;
      border-radius: 3px;
      transform: translate(-50%, -120%);
      white-space: nowrap;
      pointer-events: none;
    }

    #searchBox {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 6px;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.6); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="searchBox">
  <input type="text" id="searchInput" placeholder="Search...">
  <select id="markerList" size="5" style="width:160px;"></select>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAMpkD6c0HeJdxp6BVdQGm4P6o6V9ERSJ4",
    authDomain: "our-wurm.firebaseapp.com",
    databaseURL: "https://our-wurm-default-rtdb.firebaseio.com",
    projectId: "our-wurm",
    storageBucket: "our-wurm.firebasestorage.app",
    messagingSenderId: "900514136114",
    appId: "1:900514136114:web:3142efd7e24909a043bc2b"
  };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const markersRef = ref(db, "markers");

let markers = [];

// Map
const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
const bounds = [[0, 0], [4096, 4096]];
L.imageOverlay('Cadence-terrain-20260224.png', bounds).addTo(map);
map.fitBounds(bounds);

// Icon
function createIcon(color, pulse=false) {
  return L.divIcon({
    html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid black;${pulse ? 'animation:pulse 1s;' : ''}"></div>`,
    iconSize: [18,18]
  });
}

// Create marker
function createMarker(lat, lng, name="Unnamed", color="yellow", key=null, skipSave=false) {
  if (!key) key = push(markersRef).key;

  const marker = L.marker([lat, lng], { icon: createIcon(color), draggable: true }).addTo(map);
  marker.name = name;
  marker.color = color;
  marker.key = key;

  const label = L.marker([lat, lng], {
    icon: L.divIcon({ className: "marker-label", html: name }),
    interactive: false
  }).addTo(map);

  marker.label = label;

  marker.on("dragend", () => saveMarker(marker));
  marker.on("contextmenu", () => deleteMarker(marker.key));

  marker.bindPopup(() => `
    <b>${marker.name}</b><br>
    Name: <input id="n-${key}" value="${marker.name}"><br>
    Color:
    <select id="c-${key}">
      <option ${color==='yellow'?'selected':''}>yellow</option>
      <option ${color==='red'?'selected':''}>red</option>
      <option ${color==='blue'?'selected':''}>blue</option>
      <option ${color==='green'?'selected':''}>green</option>
    </select><br>
    <button onclick="saveEdit('${key}')">Save</button>
  `);

  markers.push(marker);

  if (!skipSave) saveMarker(marker);
}

// Save
function saveMarker(marker) {
  const pos = marker.getLatLng();
  set(ref(db, `markers/${marker.key}`), {
    lat: pos.lat,
    lng: pos.lng,
    name: marker.name,
    color: marker.color
  });
}

// Delete
function deleteMarker(key) {
  const m = markers.find(x => x.key === key);
  if (!m) return;

  map.removeLayer(m);
  map.removeLayer(m.label);
  m.off();
  markers = markers.filter(x => x.key !== key);
  remove(ref(db, `markers/${key}`));
}

// Edit
window.saveEdit = function(key) {
  const m = markers.find(x => x.key === key);
  if (!m) return;

  m.name = document.getElementById(`n-${key}`).value;
  m.color = document.getElementById(`c-${key}`).value;

  m.setIcon(createIcon(m.color));
  const el = m.label.getElement();
  if (el) el.innerHTML = m.name;

  saveMarker(m);
  m.closePopup();
};

// Sync
onValue(markersRef, snap => {
  const data = snap.val() || {};

  markers.forEach(m => {
    if (!data[m.key]) {
      map.removeLayer(m);
      map.removeLayer(m.label);
    }
  });

  markers = markers.filter(m => data[m.key]);

  Object.keys(data).forEach(key => {
    const d = data[key];
    let m = markers.find(x => x.key === key);

    if (!m) {
      createMarker(d.lat, d.lng, d.name, d.color, key, true);
    } else {
      m.setLatLng([d.lat, d.lng]);
      m.label.setLatLng([d.lat, d.lng]);
      m.name = d.name;
      m.color = d.color;
      m.setIcon(createIcon(d.color));

      const el = m.label.getElement();
      if (el) el.innerHTML = d.name;
    }
  });
});

// Add marker
map.on("click", e => {
  const name = prompt("Name?") || "Unnamed";
  createMarker(e.latlng.lat, e.latlng.lng, name);
});

// Search (live)
const input = document.getElementById("searchInput");
input.addEventListener("input", () => {
  const term = input.value.toLowerCase();

  markers.forEach(m => {
    if (m.name.toLowerCase().includes(term)) {
      m.setIcon(createIcon(m.color, true));
      setTimeout(() => m.setIcon(createIcon(m.color)), 1000);
    }
  });
});

</script>
</body>
</html>
